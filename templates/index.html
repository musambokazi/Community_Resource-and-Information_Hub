<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Hub | We're Here For You</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
</head>
<body>
    <div class="blob-bg"></div>
    <div class="blob-bg blob-2"></div>
    
    <nav class="navbar">
        <div class="nav-brand"><i class="ti ti-heart-handshake"></i><span>Community Hub</span></div>
        <button id="theme-toggle" class="btn-icon"><i class="ti ti-moon"></i></button>
    </nav>

    <header class="hero">
        <h1 id="greeting">Welcome to our community.</h1>
        <p class="subtitle">Find support and local services in your area.</p>
        <div class="search-wrapper">
            <div class="search-container">
                <i class="ti ti-search search-icon"></i>
                <input type="text" id="search-input" placeholder="What service do you need?">
                <button id="search-btn" class="btn-primary">Search</button>
            </div>
        </div>
    </header>

    <main class="resource-grid">
    {% for resource in items %}
    <article class="card {{ resource.category }}">
        
        <div class="card-img-wrapper" style="width: 100%; height: 160px; overflow: hidden; border-radius: 12px; margin-bottom: 1.2rem;">
            <img src="{{ resource.image }}" 
                 alt="{{ resource.title }}" 
                 style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease;">
        </div>

        <h2>{{ resource.title }}</h2>
        <p>{{ resource.desc }}</p>
        
        <div class="card-actions" style="display: flex; gap: 10px; width: 100%; margin-top: auto;">
            <a href="tel:{{ resource.phone }}" class="btn-danger" style="text-decoration:none; flex:1; text-align:center; padding: 10px; border-radius: 12px;">Call</a>
            <a href="https://www.google.com/maps/search/?api=1&query={{ resource.title|replace(' ', '+') }}&query_place_id={{ resource.lat }},{{ resource.lon }}" 
               target="_blank" 
               class="btn-secondary" 
               style="text-decoration:none; flex:1; text-align:center; padding: 10px; border-radius: 12px;">
               Route
            </a>
        </div>
    </article>
    {% endfor %}
</main>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
