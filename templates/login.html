<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Hub | Login</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        .auth-container {
            max-width: 400px;
            margin: 10vh auto;
            padding: 2.5rem;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            text-align: center;
        }
        .auth-form input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 14px;
            border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            outline: none;
        }
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            justify-content: center;
        }
        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            padding: 0.5rem 1rem;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .skip-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .skip-link:hover { color: var(--text-main); }
    </style>
</head>
<body data-theme="dark">
    <div class="auth-container">
        <div class="nav-brand" style="justify-content: center; margin-bottom: 2rem;">
            <i class="ti ti-heart-handshake"></i>
            <span>Community Hub</span>
        </div>

        <div class="auth-tabs">
            <button class="tab-btn active" id="login-tab" onclick="showForm('login')">Login</button>
            <button class="tab-btn" id="signup-tab" onclick="showForm('signup')">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form" action="/login" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-primary" style="width: 100%;">Welcome Back</button>
        </form>

        <!-- Signup Form (hidden by default) -->
        <form id="signup-form" class="auth-form" action="/signup" method="POST" style="display: none;">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="password" name="password" placeholder="Create Password" required>
            <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
        </form>

        <a href="/" class="skip-link">Skip for now <i class="ti ti-arrow-right"></i></a>
    </div>

    <script>
        function showForm(type) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const loginTab = document.getElementById('login-tab');
            const signupTab = document.getElementById('signup-tab');

            if (type === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                loginTab.classList.remove('active');
                signupTab.classList.add('active');
            }
        }

        // Sync theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
