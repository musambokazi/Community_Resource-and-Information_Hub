<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Community Hub</h1>
        <button id="theme-toggle">Switch Mode</button>
        <div class="search-container">
            <input type="text" placeholder="Search for services...">
            <button id="search-btn">Search</button>
        </div>
    </header>

    <main class="resource-grid">
        <section class="card">
            <h2>Health Clinic</h2>
            <div class="icon">🏥</div>
            <p>Find local doctors and clinics.</p>
            <button>View Details</button>
        </section>

        <section class="card">
            <div class="icon">🏛️</div>
            <h2>Local Government</h2>
            <p>Contact details for city officials.</p>
            <button class="view-btn">View Details</button>
        </section>

        <section class="card">
            <div class="icon">🚌</div>
            <h2>Public Transport</h2>
            <p>Bus and Train schedules.</p>
            <button class="View">View Details</button> 
        </section>

        <section class="card card-emergency">
            <div class="icon">🚨</div>
            <h2>Emergency Services</h2>
            <p>Police, Fire, and Ambulance.</p>
            <button class="view-btn">Call Now</button>
        </section>
    </main>
</body>
</html>
